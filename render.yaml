# Render Blueprint for the FastAPI backend.
# In Render: New → Blueprint → connect this repo. Render reads this file and
# creates the service. Secret values (sync: false) are entered in the dashboard,
# never committed.
services:
  - type: web
    name: snippet-finder-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: MONGO_URL
        sync: false        # MongoDB Atlas connection string
      - key: SECRET_KEY
        sync: false        # JWT signing secret (32+ chars)
      - key: OPENAI_API_KEY
        sync: false        # OpenAI key for the AI auto-fill feature
      - key: CORS_ORIGINS
        sync: false        # comma-separated frontend origins, e.g. https://your-app.vercel.app
